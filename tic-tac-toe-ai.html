<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe vs AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #eee;
    }

    h1 { font-size: 2rem; margin-bottom: 0.5rem; letter-spacing: 2px; }
    h2 { font-size: 0.9rem; color: #aaa; margin-bottom: 1rem; font-weight: normal; }

    #mode-select {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    #mode-select button {
      padding: 0.4rem 1rem;
      border: 2px solid #0f3460;
      background: transparent;
      color: #eee;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    #mode-select button.active {
      background: #0f3460;
      border-color: #e94560;
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.2rem;
      font-size: 1rem;
    }

    .score-item { text-align: center; }
    .score-item span { display: block; font-size: 1.6rem; font-weight: bold; }
    .score-x span { color: #e94560; }
    .score-o span { color: #0f9b8e; }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 6px;
    }

    .cell {
      background: #16213e;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #0f3460; }
    .cell.x { color: #e94560; }
    .cell.o { color: #0f9b8e; }
    .cell.winner { background: #0f3460; }
    .cell.disabled { cursor: default; }

    #restart {
      margin-top: 1.5rem;
      padding: 0.6rem 1.8rem;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #restart:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <h2>vs Computer</h2>

  <div id="mode-select">
    <button id="btn-easy" onclick="setDifficulty('easy')">Easy</button>
    <button id="btn-hard" class="active" onclick="setDifficulty('hard')">Hard</button>
  </div>

  <div id="score">
    <div class="score-item score-x">You (X) <span id="score-x">0</span></div>
    <div class="score-item">Draws <span id="score-draw">0</span></div>
    <div class="score-item score-o">AI (O) <span id="score-o">0</span></div>
  </div>

  <div id="status">Your turn</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button id="restart">Restart</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let gameOver = false;
    let difficulty = 'hard';
    let aiThinking = false;
    const scores = { X: 0, O: 0, draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    function setDifficulty(d) {
      difficulty = d;
      document.getElementById('btn-easy').classList.toggle('active', d === 'easy');
      document.getElementById('btn-hard').classList.toggle('active', d === 'hard');
      reset();
    }

    cells.forEach(cell => cell.addEventListener('click', () => {
      const i = +cell.dataset.index;
      if (gameOver || aiThinking || board[i]) return;

      makeMove(i, 'X');

      if (!gameOver) {
        aiThinking = true;
        status.textContent = 'AI is thinking...';
        setTimeout(() => {
          const move = difficulty === 'hard' ? bestMove() : randomMove();
          makeMove(move, 'O');
          aiThinking = false;
        }, 300);
      }
    }));

    function makeMove(i, player) {
      board[i] = player;
      cells[i].textContent = player;
      cells[i].classList.add('taken', player.toLowerCase());

      const winLine = getWinner(board);
      if (winLine) {
        winLine.forEach(idx => cells[idx].classList.add('winner'));
        status.textContent = player === 'X' ? 'You win!' : 'AI wins!';
        scores[player]++;
        updateScore();
        gameOver = true;
      } else if (board.every(Boolean)) {
        status.textContent = "It's a draw!";
        scores.draw++;
        updateScore();
        gameOver = true;
      } else if (player === 'X') {
        // status set by caller
      } else {
        status.textContent = 'Your turn';
      }
    }

    function randomMove() {
      const empty = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
      return empty[Math.floor(Math.random() * empty.length)];
    }

    function bestMove() {
      let best = -Infinity, move = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const score = minimax(board, 0, false);
          board[i] = null;
          if (score > best) { best = score; move = i; }
        }
      }
      return move;
    }

    function minimax(b, depth, isMax) {
      const win = getWinner(b);
      if (win) return isMax ? -10 + depth : 10 - depth;
      if (b.every(Boolean)) return 0;

      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = 'O';
            best = Math.max(best, minimax(b, depth + 1, false));
            b[i] = null;
          }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = 'X';
            best = Math.min(best, minimax(b, depth + 1, true));
            b[i] = null;
          }
        }
        return best;
      }
    }

    function getWinner(b) {
      return WINS.find(([a, c, d]) => b[a] && b[a] === b[c] && b[a] === b[d]) || null;
    }

    function updateScore() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-draw').textContent = scores.draw;
    }

    function reset() {
      board = Array(9).fill(null);
      gameOver = false;
      aiThinking = false;
      status.textContent = 'Your turn';
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
    }

    document.getElementById('restart').addEventListener('click', reset);
  </script>
</body>
</html>
