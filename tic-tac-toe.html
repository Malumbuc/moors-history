<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #eee;
    }

    h1 { font-size: 2rem; margin-bottom: 1rem; letter-spacing: 2px; }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 6px;
    }

    .cell {
      background: #16213e;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #0f3460; }
    .cell.x { color: #e94560; }
    .cell.o { color: #0f9b8e; }
    .cell.winner { background: #0f3460; }

    #restart {
      margin-top: 1.5rem;
      padding: 0.6rem 1.8rem;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #restart:hover { background: #c73652; }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-item { text-align: center; }
    .score-item span { display: block; font-size: 1.6rem; font-weight: bold; }
    .score-x span { color: #e94560; }
    .score-o span { color: #0f9b8e; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="score">
    <div class="score-item score-x">X <span id="score-x">0</span></div>
    <div class="score-item">Draws <span id="score-draw">0</span></div>
    <div class="score-item score-o">O <span id="score-o">0</span></div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button id="restart">Restart</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diagonals
    ];

    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;
    const scores = { X: 0, O: 0, draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    cells.forEach(cell => cell.addEventListener('click', () => {
      const i = +cell.dataset.index;
      if (gameOver || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const winLine = getWinner();
      if (winLine) {
        winLine.forEach(idx => cells[idx].classList.add('winner'));
        status.textContent = `Player ${current} wins!`;
        scores[current]++;
        updateScore();
        gameOver = true;
      } else if (board.every(Boolean)) {
        status.textContent = "It's a draw!";
        scores.draw++;
        updateScore();
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `Player ${current}'s turn`;
      }
    }));

    document.getElementById('restart').addEventListener('click', reset);

    function getWinner() {
      return WINS.find(([a,b,c]) => board[a] && board[a] === board[b] && board[a] === board[c]) || null;
    }

    function updateScore() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-draw').textContent = scores.draw;
    }

    function reset() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      status.textContent = "Player X's turn";
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
    }
  </script>
</body>
</html>
